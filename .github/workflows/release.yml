name: Release

# Trigger manually from the GitHub Actions tab.
# Select a component folder and enter a version tag (e.g. v1.0.0).
# The workflow builds Go binaries for 5 platforms, then publishes
# a GitHub Release with all binaries and a SHA256SUMS checksum file.
on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Component to release'
        required: true
        default: 'market-maker'
        type: choice
        options:
          - market-maker
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string

# Full tag written to git will be: {folder}/{version}  e.g. market-maker/v1.0.0
# This lets each component in the monorepo version independently.

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build job — runs once per target platform
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86-64 ────────────────────────────────────────────────────
          - os: ubuntu-latest
            go_os: linux
            go_arch: amd64
            suffix: linux-amd64

          # ── Linux ARM64 ─────────────────────────────────────────────────────
          - os: ubuntu-latest
            go_os: linux
            go_arch: arm64
            suffix: linux-arm64

          # ── macOS Intel (cross-compiled from Linux) ─────────────────────────
          - os: ubuntu-latest
            go_os: darwin
            go_arch: amd64
            suffix: darwin-amd64

          # ── macOS Apple Silicon ─────────────────────────────────────────────
          - os: macos-latest
            go_os: darwin
            go_arch: arm64
            suffix: darwin-arm64

          # ── Windows x86-64 ──────────────────────────────────────────────────
          - os: windows-latest
            go_os: windows
            go_arch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      # ── Go binary ────────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.folder }}/go/go.mod
          cache-dependency-path: ${{ inputs.folder }}/go/go.sum

      - name: Build Go binary
        shell: bash
        working-directory: ${{ inputs.folder }}/go
        env:
          GOOS: ${{ matrix.go_os }}
          GOARCH: ${{ matrix.go_arch }}
          CGO_ENABLED: '0'
        run: |
          EXT="${{ matrix.ext }}"
          go build \
            -ldflags="-s -w -X main.version=${{ inputs.version }}" \
            -o "decibel-mm-${{ matrix.suffix }}${EXT}" \
            .

      # ── Stage artifacts ────────────────────────────────────────────────────
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          EXT="${{ matrix.ext }}"
          cp "${{ inputs.folder }}/go/decibel-mm-${{ matrix.suffix }}${EXT}" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Release job — collects artifacts and publishes to GitHub Releases
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create tags and releases

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - name: Generate SHA256 checksums
        working-directory: dist
        run: sha256sum * | tee SHA256SUMS.txt

      - name: List release assets
        run: ls -lh dist/

      # Derive a clean display name from the folder input
      # e.g. "market-maker" → "Market Maker"
      - name: Set release metadata
        id: meta
        run: |
          FOLDER="${{ inputs.folder }}"
          DISPLAY=$(echo "$FOLDER" | sed 's/-/ /g; s/\b\(.\)/\u\1/g')
          echo "display=${DISPLAY}" >> "$GITHUB_OUTPUT"
          echo "tag=${FOLDER}/${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "${{ steps.meta.outputs.display }} ${{ inputs.version }}"
          files: dist/*
          generate_release_notes: true
          body: |
            ## Decibel Market Maker Bot ${{ inputs.version }}

            全自动做市商机器人，为 [Decibel DEX](https://decibel.trade) 永续合约市场提供双边报价。
            Automated market-maker bot for perpetual futures on Decibel DEX (Aptos blockchain).

            ### 功能亮点 / Highlights

            - **Go 实现** — 单一 Go 二进制，静态链接、无额外运行时依赖
            - **库存偏斜定价 / Inventory-skew pricing** — 根据持仓自动调整报价中心，鼓励仓位均值回归
            - **自适应价差 / Adaptive spread** — 无成交时自动收窄价差，成交后自动放宽
            - **Dry-run 模式** — 无需真实交易即可验证配置
            - **支持 testnet / mainnet**，一键切换（Aptos 链 ID 由 `NETWORK` 自动匹配：testnet=2，mainnet=1）
            - **链上提交** — Go 侧使用 `aptos-go-sdk` **v1**（`EntryFunctionWithArgs` + `BuildTransaction` + 签名提交）

            ---

            ### 下载说明 / Download

            | 文件名 / File | 平台 / Platform |
            |---|---|
            | `decibel-mm-linux-amd64` | Linux x86-64 |
            | `decibel-mm-linux-arm64` | Linux ARM64 |
            | `decibel-mm-darwin-amd64` | macOS Intel |
            | `decibel-mm-darwin-arm64` | macOS Apple Silicon |
            | `decibel-mm-windows-amd64.exe` | Windows x86-64 |

            所有二进制文件均为 Go 静态编译，无需任何运行时依赖。

            ---

            ### 快速开始 / Quick Start

            ```bash
            # 1. 下载对应平台的二进制（示例：Linux x86-64）并赋予执行权限
            chmod +x decibel-mm-linux-amd64

            # 2. 可选：从仓库复制 market-maker/go/.env.example 为 .env，用环境变量提供凭证
            ```

            Go 标准库 `flag` 使用**单横线**长选项（如 `-network`），不是 Rust/clap 的 `--network`。

            #### Testnet · BTC/USD（命令行示例，凭证为占位，必须替换）

            `-bearer-token`、`-subaccount`、`-private-key` 以下为**虚构示例**；`-node-api-key` 可整行省略（未设置时与 bot 一致，回退为 bearer）。**不要在共享机器上用 `-private-key`（会出现在进程列表）。**

            ```bash
            ./decibel-mm-linux-amd64 \
              -network testnet \
              -market-name 'BTC/USD' \
              -bearer-token 'decibel_testnet_PLACEHOLDER_replace_with_dashboard_token' \
              -subaccount '0xbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb' \
              -private-key '0xaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' \
              -dry-run

            # 确认无误后去掉 -dry-run 实际上链（自行评估风险）
            # ./decibel-mm-linux-amd64 -network testnet -market-name 'BTC/USD' ...（同上，无 -dry-run）
            ```

            Windows：使用 `decibel-mm-windows-amd64.exe`，参数相同；含空格的值在 PowerShell 用单引号包裹。

            详细参数说明请参阅 `market-maker/go/README.md` 与 `market-maker/做市参数调优指南.md`。

            ---

            ### 校验文件完整性 / Verify Integrity

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
