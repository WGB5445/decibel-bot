name: Market Maker Go

on:
  push:
    paths:
      - "market-maker/go/**"
      - ".github/workflows/market-maker-go.yml"
  pull_request:
    paths:
      - "market-maker/go/**"
      - ".github/workflows/market-maker-go.yml"

defaults:
  run:
    working-directory: market-maker/go

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -o /tmp/decibel-mm .
