# Decibel market-maker — example YAML config (copy and fill in secrets).
# Priority: CLI flags > this file > environment variables > network preset defaults.
# Keys use snake_case. Omit keys you do not want to set (nil = do not override env).

network: testnet
market_name: BTC/USD
spread: 0.001
order_size: 0.001
max_inventory: 0.005
skew_per_unit: 0.0001
max_margin_usage: 0.5
refresh_interval: 20
refresh_interval_jitter: 0 # seconds; uniform in [refresh_interval−jitter, refresh_interval+jitter]; 0 = off
auto_flatten: false
flatten_aggression: 0.001
dry_run: true
auto_spread: false
spread_min: 0.0004
spread_max: 0.02
spread_no_fill_cycles: 3
spread_step: 0.0002

bearer_token: YOUR_DECIBEL_BEARER_TOKEN
subaccount_address: "0xYOUR_SUBACCOUNT_OBJECT_ADDRESS"
private_key: "0x1111111111111111111111111111111111111111111111111111111111111111"

# Optional overrides (uncomment as needed):
# node_api_key: ""
# package_address: ""
# aptos_fullnode_url: ""
# market_addr: ""
# rest_api_base: ""

# tg_bot_token: ""
# tg_admin_id: 0
# tg_alert_inventory: false
# tg_alert_inventory_interval_min: 30
# tg_strict_start: false
