# ==========================================
# Decibel 做市机器人配置文件
# ==========================================
# 把这个文件复制一份，填上你自己的信息就能跑。
# 所有带 "" 的地方都必须填，其他保持默认即可。


# ========== 环境设置 ==========
# 交易环境：testnet（测试网，假钱）| mainnet（主网，真钱）
# 新手建议：先用 testnet 跑一周，确认没问题再切 mainnet
env: testnet


# ========== Decibel 账户信息 ==========
decibel:
  # API Token（从 Decibel 网站 API 管理页面复制）
  # 这是一串很长的字符，以 eyJ 开头，千万别泄露给别人！
  bearer_token: ""

  # 钱包私钥（从 Petra 钱包导出）
  # 格式：0x1234abcd...（64位十六进制字符）
  # 私钥 = 你的银行密码，绝对不要发给任何人！
  api_wallet_private_key: ""

  # 钱包地址（已从私钥自动推导，无需填写）
  # 如果你填了地址但和私钥不匹配，机器人会发出警告
  api_wallet_address: ""

  # 子账户地址（从 Decibel 网站创建子账户后复制）
  # 为什么用子账户？把机器人资金和手动交易资金分开，更安全
  subaccount_address: ""

  # 交易市场名称（如 BTC-USD、ETH-USD）
  # 必须和 Decibel 网站上显示的名称完全一致
  market_name: "BTC-USD"

  # 推荐人代码（没有就留空）
  builder_code: ""


# ========== Aptos 节点设置 ==========
# 机器人通过它提交交易、查询交易状态
# 留空时自动根据 env 选择官方节点：
#   testnet -> https://fullnode.testnet.aptoslabs.com/v1
#   mainnet -> https://fullnode.mainnet.aptoslabs.com/v1
# 如果你有自定义 RPC（如 Alchemy、QuickNode、自建节点），可在此填写
aptos:
  fullnode_url: ""


# ========== 策略参数 ==========
# 下面这些参数直接决定机器人怎么买卖，也是最容易影响盈亏的地方
strategy:

  # ---------- 杠杆 ----------
  # 杠杆就像借钱做生意。
  # 10倍杠杆 = 你有 100 块，机器人会帮你做 1000 块的生意
  # 新手建议：先用 1~2 倍，熟练后再加
  leverage: 1

  # ---------- 买卖价差 ----------
  # 机器人会在"中间价"两边挂单赚差价。
  # bid_spread 是买价偏离中间价的百分比。
  # 0.01 = 1%，如果比特币 100,000 美元，买价就是 99,000 美元
  bid_spread: "0.0001"

  # ask_spread 是卖价偏离中间价的百分比。
  # 0.01 = 1%，如果比特币 100,000 美元，卖价就是 101,000 美元
  ask_spread: "0.0001"

  # ---------- 订单大小 ----------
  # 每一笔挂单买卖多少币。
  # 0.1 = 每次交易 0.1 个 BTC
  # 资金少的话设小一点，比如 0.001
  order_amount: "0.001"

  # ---------- 订单档数 ----------
  # 机器人同时在多少个价格档位挂单。
  # 1 = 只在最优价格挂 1 单买 + 1 单卖
  # 3 = 挂 3 单买 + 3 单卖，价格逐层拉开
  order_levels: 1

  # 档间价差（order_levels > 1 时才生效）
  # 每一档之间拉开多少百分比
  order_level_spread: "0.01"

  # 增量订单大小（order_levels > 1 时才生效）
  # 每一档的订单量比前一档大多少。0 = 每档一样大
  order_level_amount: "0"

  # ---------- 订单刷新 ----------
  # 多久重新计算一次价格并更新订单。
  # 30s = 每 30 秒刷新一次
  # 刷新太频繁会增加 gas 费（区块链交易费）
  order_refresh_time: "20s"

  # 刷新容差：价格变化小于这个百分比时，不用撤单重挂
  # 0 = 任何价格变化都刷新
  order_refresh_tolerance_pct: "0"

  # ---------- 成交后冷却 ----------
  # 成交后暂停多久再下单，防止机器人"上头"连续乱交易。
  # 60s = 成交后等 60 秒
  filled_order_delay: "60s"

  # ---------- 价格限制 ----------
  # 最小价差限制：低于此值的订单会被撤掉。-100 = 不限制
  minimum_spread: "-100"

  # 价格上限：当价格涨到这个值以上时，不再挂买单。-1 = 不限制
  price_ceiling: "-1"

  # 价格下限：当价格跌到这个值以下时，不再挂卖单。-1 = 不限制
  price_floor: "-1"

  # ---------- 止盈（按档位，可选） ----------
  # 多头止盈价差：持有多仓时，赚了多少就挂止盈单。0 = 不自动挂
  long_profit_taking_spread: "0"

  # 空头止盈价差：持有空仓时，赚了多少就挂止盈单。0 = 不自动挂
  short_profit_taking_spread: "0"

  # ---------- 止损相关 ----------
  # 止损价差（已废弃，现在统一使用下面的 stop_loss）
  stop_loss_spread: "0"

  # 市价止损时的价格滑点缓冲。0.005 = 允许 0.5% 的滑点
  stop_loss_slippage_buffer: "0.005"

  # 两次止损下单之间最少间隔多久
  time_between_stop_loss_orders: "60s"

  # ---------- 订单优化（进阶） ----------
  # 是否开启"跳价抢最优"功能。
  # true = 机器人会挂比当前最优价稍微好一点点的价格，争取排在第一位
  # 新手建议：false（简单，不容易出错）
  order_optimization_enabled: false

  ask_order_optimization_depth: "0"
  bid_order_optimization_depth: "0"

  # ---------- Triple Barrier 风控（核心保命设置） ----------
  # 止损：仓位亏到多少百分比时，自动市价平仓止损
  # 0.03 = 亏 3% 就止损。没有止损 = 裸奔！
  stop_loss: "0.03"

  # 止盈：仓位赚到多少百分比时，自动市价平仓止盈
  # 0.02 = 赚 2% 就止盈。做市靠积少成多。
  take_profit: "0.02"

  # 持仓时限：一个仓位最多拿多久，超时自动平仓
  # 做市的本质是"快进快出"，拿太久说明市场方向对你不利
  time_limit: "45m"

  # ---------- 交易行为 ----------
  # true = 把买卖单打包成一个交易提交（省 gas 费，推荐）
  use_bulk_orders: true

  # PostOnly 模式：只挂单，不吃单（手续费更低甚至返佣）
  post_only: true

  # 最大未确认交易数。超过后新交易会被丢弃
  max_pending_tx: 10

  # 交易确认轮询间隔：多久检查一次链上交易是否确认
  tx_poll_interval: "2s"

  # WebSocket 断线后，等待多久再重连
  ws_reconnect_delay: "5s"
